<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trading Journal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg:        #07070d;
      --surface:   #0d0d1a;
      --surface-2: #121222;
      --border:    #1a1a2e;
      --border-2:  #252540;
      --text-1:    #eeeef8;
      --text-2:    #7878a0;
      --text-3:    #383858;
      --green:     #00E5A0;
      --green-dim: rgba(0,229,160,0.10);
      --green-bd:  rgba(0,229,160,0.25);
      --red:       #ef4444;
      --red-dim:   rgba(239,68,68,0.10);
      --red-bd:    rgba(239,68,68,0.25);
      --accent:    #6366f1;
      --accent-dim:rgba(99,102,241,0.15);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text-1);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .live-dot {
      width: 7px;
      height: 7px;
      background: var(--green);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.4; }
    }

    .header-brand h1 {
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--text-1);
      letter-spacing: 0.02em;
    }

    .header-right {
      font-size: 0.72rem;
      color: var(--text-3);
    }

    /* ── MAIN ── */
    .main {
      padding: 24px 28px;
      max-width: 1600px;
      margin: 0 auto;
    }

    /* ── PERIOD CARDS ── */
    .period-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }

    .period-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      transition: border-color 0.2s, transform 0.15s;
    }

    .period-card:hover {
      border-color: var(--border-2);
      transform: translateY(-1px);
    }

    .period-title {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-3);
      margin-bottom: 16px;
    }

    .period-metrics-row {
      display: flex;
      gap: 20px;
      margin-bottom: 12px;
    }

    .period-metric .mlabel {
      font-size: 0.62rem;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 2px;
    }

    .period-metric .mvalue {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text-1);
    }

    .period-pnl {
      font-size: 1.55rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 14px;
      line-height: 1.2;
    }

    .period-pnl.pos { color: var(--green); }
    .period-pnl.neg { color: var(--red); }
    .period-pnl.neu { color: var(--text-2); }

    .period-counters {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .cnt {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.76rem;
      font-weight: 500;
    }

    .cnt-circle {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.55rem;
      font-weight: 800;
      letter-spacing: 0;
    }

    .cnt-circle.w { background: var(--green-dim); color: var(--green); border: 1px solid var(--green-bd); }
    .cnt-circle.l { background: var(--red-dim);   color: var(--red);   border: 1px solid var(--red-bd); }
    .cnt-circle.b { background: rgba(120,120,160,0.12); color: var(--text-2); border: 1px solid rgba(120,120,160,0.22); }

    .cnt-num { color: var(--text-2); }

    /* ── CHART LAYOUT ── */
    .row { display: grid; gap: 14px; margin-bottom: 14px; }
    .row.full   { grid-template-columns: 1fr; }
    .row.half   { grid-template-columns: 1fr 1fr; }
    .row.thirds { grid-template-columns: 1fr 1fr 1fr; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .card-header h2 {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* ── TIMEFRAME SELECTOR ── */
    .tf-sel {
      display: flex;
      gap: 2px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 3px;
    }

    .tf-btn {
      background: none;
      border: none;
      color: var(--text-3);
      font-size: 0.68rem;
      font-weight: 600;
      font-family: inherit;
      padding: 4px 9px;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.03em;
    }

    .tf-btn:hover  { color: var(--text-2); }
    .tf-btn.active { background: var(--accent); color: #fff; }

    /* ── CHART WRAPPERS ── */
    .chart-wrap { position: relative; }
    .chart-wrap.h-xl  { height: 280px; }
    .chart-wrap.h-lg  { height: 240px; }
    .chart-wrap.h-md  { height: 200px; }

    /* ── MONTHLY TABLE ── */
    .monthly-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }

    .monthly-table th {
      padding: 9px 10px;
      text-align: left;
      font-size: 0.63rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--text-3);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    .monthly-table th:not(:first-child) { text-align: right; }

    .monthly-table td {
      padding: 9px 10px;
      border-bottom: 1px solid rgba(26,26,46,0.6);
    }

    .monthly-table td:not(:first-child) { text-align: right; }
    .monthly-table tr:last-child td { border-bottom: none; }

    .monthly-table tr.pos-row td:first-child { border-left: 2px solid var(--green); }
    .monthly-table tr.neg-row td:first-child { border-left: 2px solid var(--red); }

    .mth-name { font-weight: 500; color: var(--text-1); }
    .pnl-pos  { color: var(--green); font-weight: 600; }
    .pnl-neg  { color: var(--red);   font-weight: 600; }
    .val-dim  { color: var(--text-2); }

    .table-scroll { overflow-y: auto; max-height: 300px; }

    /* scrollbar */
    .table-scroll::-webkit-scrollbar { width: 4px; }
    .table-scroll::-webkit-scrollbar-track { background: transparent; }
    .table-scroll::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 4px; }

    /* ── SECTION DIVIDER ── */
    .section-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0 16px;
    }

    .section-divider span {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-3);
      white-space: nowrap;
    }

    .section-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── SYMBOL KPI CARDS ── */
    .sym-kpi-label {
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-3);
      margin-bottom: 10px;
    }

    .sym-kpi-symbol {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-1);
      margin-bottom: 4px;
    }

    .sym-kpi-val {
      font-size: 1.1rem;
      font-weight: 700;
    }

    .sym-kpi-val.pos { color: var(--green); }
    .sym-kpi-val.neg { color: var(--red); }

    .sym-kpi-count {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-1);
      line-height: 1;
    }

    /* ── WIN/LOSS BARS ── */
    .wl-row {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .wl-item { display: flex; flex-direction: column; gap: 6px; }

    .wl-meta {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .wl-name {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-2);
    }

    .wl-amount {
      font-size: 1rem;
      font-weight: 700;
    }

    .wl-track {
      height: 8px;
      background: var(--surface-2);
      border-radius: 4px;
      overflow: hidden;
    }

    .wl-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.4s ease;
    }

    /* ── ANALYSIS CARD ── */
    .analysis-label {
      font-size: 0.62rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-3);
      margin-bottom: 14px;
    }

    .analysis-wr {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 6px;
    }

    .analysis-wr-pct {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-1);
    }

    .analysis-wr-label {
      font-size: 0.65rem;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    .progress-track {
      height: 5px;
      background: var(--surface-2);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 14px;
    }

    .progress-fill {
      height: 100%;
      background: var(--green);
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    .analysis-counts {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }

    .analysis-cnt {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-2);
    }

    .dot-w { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }
    .dot-l { width: 7px; height: 7px; border-radius: 50%; background: var(--red); }
    .dot-b { width: 7px; height: 7px; border-radius: 50%; background: var(--text-3); }

    .analysis-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .astat { display: flex; flex-direction: column; gap: 2px; }

    .astat-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-3);
    }

    .astat-val {
      font-size: 0.88rem;
      font-weight: 600;
    }

    /* ── LONG/SHORT RATIO ── */
    .ls-labels {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .ls-label {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .ls-label.long  { color: var(--green); }
    .ls-label.short { color: var(--red); }

    .ls-bar-track {
      height: 10px;
      border-radius: 5px;
      overflow: hidden;
      display: flex;
      margin-bottom: 10px;
    }

    .ls-bar-long  { background: var(--green); transition: width 0.4s ease; }
    .ls-bar-short { background: var(--red);   transition: width 0.4s ease; flex: 1; }

    .ls-stats {
      display: flex;
      justify-content: space-between;
    }

    .ls-stat { display: flex; flex-direction: column; gap: 3px; }

    .ls-stat-pct {
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1;
    }

    .ls-stat-pct.long  { color: var(--green); }
    .ls-stat-pct.short { color: var(--red); }

    .ls-stat-sub {
      font-size: 0.68rem;
      color: var(--text-3);
    }

    .ls-divider {
      width: 1px;
      background: var(--border);
      align-self: stretch;
    }

    /* ── STATES ── */
    #error-banner {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.25);
      color: var(--red);
      padding: 16px 24px;
      font-size: 0.83rem;
      display: none;
    }

    .loading-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      gap: 14px;
      color: var(--text-3);
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 2px solid var(--border-2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-label {
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 1100px) {
      .period-grid { grid-template-columns: repeat(2, 1fr); }
      .row.thirds  { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 700px) {
      .period-grid { grid-template-columns: 1fr 1fr; }
      .row.half    { grid-template-columns: 1fr; }
      .row.thirds  { grid-template-columns: 1fr; }
      .main { padding: 16px; }
    }

    @media (max-width: 440px) {
      .period-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-brand">
      <div class="live-dot"></div>
      <h1>Trading Journal</h1>
    </div>
    <div class="header-right" id="lastUpdated"></div>
  </header>

  <div id="error-banner"></div>

  <div class="loading-wrap" id="loadingEl">
    <div class="spinner"></div>
    <div class="loading-label">Loading trades</div>
  </div>

  <main class="main" id="dashboard" style="display:none">

    <!-- PERIOD CARDS -->
    <div class="period-grid" id="periodGrid"></div>

    <!-- EQUITY CURVE -->
    <div class="row full">
      <div class="card">
        <div class="card-header">
          <h2>Account Balance</h2>
          <div class="tf-sel" id="equityTf">
            <button class="tf-btn" data-tf="1W">1W</button>
            <button class="tf-btn" data-tf="1M">1M</button>
            <button class="tf-btn" data-tf="3M">3M</button>
            <button class="tf-btn" data-tf="6M">6M</button>
            <button class="tf-btn" data-tf="1Y">1Y</button>
            <button class="tf-btn active" data-tf="ALL">ALL</button>
          </div>
        </div>
        <div class="chart-wrap h-xl">
          <canvas id="chartEquity"></canvas>
        </div>
      </div>
    </div>


    <!-- ══ PERFORMANCE BREAKDOWN ══ -->
    <div class="section-divider"><span>Performance Breakdown</span></div>

    <!-- 5 Symbol KPI Cards -->
    <div class="row" style="grid-template-columns: repeat(5,1fr); margin-bottom:14px" id="symbolKpis"></div>

    <!-- Largest Win/Loss · Long Analysis · Short Analysis · L/S Ratio -->
    <div class="row" style="grid-template-columns: 1fr 1fr 1fr 1fr">

      <!-- Largest Win vs Loss -->
      <div class="card" id="cardWinLoss">
        <div class="card-header"><h2>Largest Win vs Loss</h2></div>
        <div class="wl-row" id="wlRows"></div>
      </div>

      <!-- Long Analysis -->
      <div class="card" id="cardLong">
        <div class="analysis-label">Long Analysis</div>
        <div id="longContent"></div>
      </div>

      <!-- Short Analysis -->
      <div class="card" id="cardShort">
        <div class="analysis-label">Short Analysis</div>
        <div id="shortContent"></div>
      </div>

      <!-- Long/Short Ratio -->
      <div class="card" id="cardLSRatio">
        <div class="card-header"><h2>Long / Short Ratio</h2></div>
        <div id="lsRatio"></div>
      </div>

    </div>


  </main>

  <script>
    /* ── CONSTANTS ── */
    const GREEN  = '#00E5A0';
    const RED    = '#ef4444';
    const ACCENT = '#6366f1';
    const DIM    = '#383858';

    const TOOLTIP_BASE = {
      backgroundColor: '#0d0d1a',
      borderColor: '#252540',
      borderWidth: 1,
      titleColor: '#7878a0',
      bodyColor: '#eeeef8',
      padding: 12,
      cornerRadius: 8,
      displayColors: false,
    };

    const SCALES_BASE = {
      x: {
        ticks: { color: DIM, font: { size: 11, family: 'Inter' } },
        grid: { color: 'rgba(26,26,46,0.7)' },
        border: { color: '#1a1a2e' },
      },
      y: {
        ticks: { color: DIM, font: { size: 11, family: 'Inter' } },
        grid: { color: 'rgba(26,26,46,0.7)' },
        border: { color: '#1a1a2e' },
      },
    };

    /* ── FORMAT HELPERS ── */
    function fmt(n) {
      const abs = Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      return (n >= 0 ? '+$' : '-$') + abs;
    }

    function fmtShort(n) {
      if (Math.abs(n) >= 1000)
        return (n >= 0 ? '+$' : '-$') + (Math.abs(n) / 1000).toFixed(1) + 'k';
      return fmt(n);
    }

    function fmtDate(str) {
      const d = new Date(str + 'T12:00:00Z');
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function fmtMonth(yyyymm) {
      const [y, m] = yyyymm.split('-');
      const names = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return `${names[+m - 1]} '${y.slice(2)}`;
    }

    function barColors(vals) {
      return vals.map(v => v >= 0 ? GREEN : RED);
    }

    /* ── STATE ── */
    let equityChart  = null;
    let allEquity    = [];

    /* ── EQUITY CHART ── */
    function filteredEquity(tf) {
      const days = { '1W':7, '1M':30, '3M':90, '6M':180, '1Y':365 };
      if (tf === 'ALL') return allEquity;
      const cutoff = Date.now() - days[tf] * 86400000;
      return allEquity.filter(d => new Date(d.date + 'T12:00:00Z').getTime() >= cutoff);
    }

    function renderEquity(tf) {
      const data   = filteredEquity(tf);
      const labels = data.map(d => fmtDate(d.date));
      const values = data.map(d => d.cumPnL);
      const sparse = data.length > 40;

      if (equityChart) {
        equityChart.data.labels = labels;
        equityChart.data.datasets[0].data = values;
        equityChart.data.datasets[0].pointRadius = sparse ? 0 : 3;
        equityChart.update('none');
        return;
      }

      const ctx  = document.getElementById('chartEquity').getContext('2d');
      const grad = ctx.createLinearGradient(0, 0, 0, 280);
      grad.addColorStop(0, 'rgba(99,102,241,0.22)');
      grad.addColorStop(1, 'rgba(99,102,241,0.00)');

      equityChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            data: values,
            borderColor: ACCENT,
            backgroundColor: grad,
            fill: true,
            tension: 0.35,
            pointRadius: sparse ? 0 : 3,
            pointHoverRadius: 5,
            borderWidth: 2,
            pointBackgroundColor: ACCENT,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { display: false },
            tooltip: {
              ...TOOLTIP_BASE,
              callbacks: {
                title: items => items[0].label,
                label: item => '  ' + fmt(item.raw),
              },
            },
          },
          scales: {
            ...SCALES_BASE,
            y: {
              ...SCALES_BASE.y,
              ticks: { ...SCALES_BASE.y.ticks, callback: v => fmtShort(v) },
            },
          },
        },
      });
    }

    /* ── RR CHART ── */

    /* ── BAR CHART HELPER ── */
    function makeBar(canvasId, labels, values) {
      const ctx = document.getElementById(canvasId).getContext('2d');
      return new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            data: values,
            backgroundColor: barColors(values),
            borderRadius: 6,
            borderSkipped: false,
            maxBarThickness: 40,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              ...TOOLTIP_BASE,
              callbacks: { label: item => '  ' + fmt(item.raw) },
            },
          },
          scales: {
            ...SCALES_BASE,
            y: {
              ...SCALES_BASE.y,
              ticks: { ...SCALES_BASE.y.ticks, callback: v => fmtShort(v) },
            },
          },
        },
      });
    }

    /* ── HORIZONTAL BAR CHART HELPER ── */
    function makeHBar(canvasId, labels, values) {
      const ctx = document.getElementById(canvasId).getContext('2d');
      return new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            data: values,
            backgroundColor: barColors(values),
            borderRadius: 6,
            borderSkipped: false,
            maxBarThickness: 28,
          }],
        },
        options: {
          indexAxis: 'y',
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              ...TOOLTIP_BASE,
              callbacks: { label: item => '  ' + fmt(item.raw) },
            },
          },
          scales: {
            x: {
              ...SCALES_BASE.x,
              ticks: { ...SCALES_BASE.x.ticks, callback: v => fmtShort(v) },
            },
            y: { ...SCALES_BASE.y },
          },
        },
      });
    }

    /* ── PERIOD CARDS ── */
    function renderPeriods(byPeriod) {
      const defs = [
        { key: 'thisWeek',  label: 'This Week' },
        { key: 'thisMonth', label: 'This Month' },
        { key: 'thisYear',  label: 'This Year' },
        { key: 'allTime',   label: 'All Time' },
      ];

      document.getElementById('periodGrid').innerHTML = defs.map(({ key, label }) => {
        const p = byPeriod[key];
        const pnlCls = p.totalPnL > 0 ? 'pos' : p.totalPnL < 0 ? 'neg' : 'neu';
        const pnlStr = p.total === 0 ? '$0.00' : fmt(p.totalPnL);
        const rrStr  = p.avgRR > 0 ? p.avgRR.toFixed(2) : '—';
        const wrStr  = p.total > 0 ? p.winRate + '%' : '—';
        return `
          <div class="period-card">
            <div class="period-title">${label}</div>
            <div class="period-metrics-row">
              <div class="period-metric">
                <div class="mlabel">Avg RR</div>
                <div class="mvalue">${rrStr}</div>
              </div>
              <div class="period-metric">
                <div class="mlabel">Win Rate</div>
                <div class="mvalue">${wrStr}</div>
              </div>
            </div>
            <div class="period-pnl ${pnlCls}">${pnlStr}</div>
            <div class="period-counters">
              <div class="cnt"><div class="cnt-circle w">W</div><span class="cnt-num">${p.wins}</span></div>
              <div class="cnt"><div class="cnt-circle l">L</div><span class="cnt-num">${p.losses}</span></div>
              <div class="cnt"><div class="cnt-circle b">BE</div><span class="cnt-num">${p.breakEvens}</span></div>
            </div>
          </div>`;
      }).join('');
    }


    /* ── PERFORMANCE BREAKDOWN ── */
    function analysisHTML(p) {
      const wrPct = p.total > 0 ? p.winRate : 0;
      return `
        <div class="analysis-wr">
          <div class="analysis-wr-pct">${p.total > 0 ? wrPct + '%' : '—'}</div>
          <div class="analysis-wr-label">Win Rate</div>
        </div>
        <div class="progress-track">
          <div class="progress-fill" style="width:${wrPct}%"></div>
        </div>
        <div class="analysis-counts">
          <div class="analysis-cnt"><div class="dot-w"></div> ${p.wins} Wins</div>
          <div class="analysis-cnt"><div class="dot-l"></div> ${p.losses} Losses</div>
          <div class="analysis-cnt"><div class="dot-b"></div> ${p.breakEvens} BE</div>
        </div>
        <div class="analysis-stats">
          <div class="astat">
            <div class="astat-label">Total P&L</div>
            <div class="astat-val ${p.totalPnL >= 0 ? 'pnl-pos' : 'pnl-neg'}">${fmt(p.totalPnL)}</div>
          </div>
          <div class="astat">
            <div class="astat-label">Trades</div>
            <div class="astat-val val-dim">${p.total}</div>
          </div>
          <div class="astat">
            <div class="astat-label">Avg Win</div>
            <div class="astat-val pnl-pos">${p.avgWin !== 0 ? fmt(p.avgWin) : '—'}</div>
          </div>
          <div class="astat">
            <div class="astat-label">Avg Loss</div>
            <div class="astat-val pnl-neg">${p.avgLoss !== 0 ? fmt(p.avgLoss) : '—'}</div>
          </div>
        </div>`;
    }

    function renderBreakdown({ symbolSummary, positionBreakdown, stats }) {
      // ── 5 Symbol KPI Cards ──
      const kpiDefs = [
        { label: 'Best Symbol (Total)',  s: symbolSummary.bestSum,  key: 'totalPnL' },
        { label: 'Worst Symbol (Total)', s: symbolSummary.worstSum, key: 'totalPnL' },
        { label: 'Best Symbol (Avg)',    s: symbolSummary.bestAvg,  key: 'avgPnL' },
        { label: 'Worst Symbol (Avg)',   s: symbolSummary.worstAvg, key: 'avgPnL' },
      ];

      const kpiCards = kpiDefs.map(({ label, s, key }) => {
        if (!s) return `<div class="card"><div class="sym-kpi-label">${label}</div><div class="sym-kpi-val val-dim">—</div></div>`;
        const val = s[key];
        return `
          <div class="card">
            <div class="sym-kpi-label">${label}</div>
            <div class="sym-kpi-symbol">${s.symbol}</div>
            <div class="sym-kpi-val ${val >= 0 ? 'pos' : 'neg'}">${fmt(val)}</div>
          </div>`;
      });

      kpiCards.push(`
        <div class="card" style="display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center">
          <div class="sym-kpi-label">Symbols Traded</div>
          <div class="sym-kpi-count">${symbolSummary.count}</div>
        </div>`);

      document.getElementById('symbolKpis').innerHTML = kpiCards.join('');

      // ── Largest Win vs Loss ──
      const maxAbs = Math.max(Math.abs(stats.bestTrade), Math.abs(stats.worstTrade)) || 1;
      const winW   = (Math.abs(stats.bestTrade)  / maxAbs * 100).toFixed(1);
      const lossW  = (Math.abs(stats.worstTrade) / maxAbs * 100).toFixed(1);

      document.getElementById('wlRows').innerHTML = `
        <div class="wl-item">
          <div class="wl-meta">
            <span class="wl-name">Largest Win</span>
            <span class="wl-amount pnl-pos">${fmt(stats.bestTrade)}</span>
          </div>
          <div class="wl-track"><div class="wl-fill" style="width:${winW}%;background:var(--green)"></div></div>
        </div>
        <div class="wl-item">
          <div class="wl-meta">
            <span class="wl-name">Largest Loss</span>
            <span class="wl-amount pnl-neg">${fmt(stats.worstTrade)}</span>
          </div>
          <div class="wl-track"><div class="wl-fill" style="width:${lossW}%;background:var(--red)"></div></div>
        </div>`;

      // ── Long & Short Analysis ──
      document.getElementById('longContent').innerHTML  = analysisHTML(positionBreakdown.long);
      document.getElementById('shortContent').innerHTML = analysisHTML(positionBreakdown.short);

      // ── Long/Short Ratio ──
      const total    = positionBreakdown.longCount + positionBreakdown.shortCount || 1;
      const longPct  = ((positionBreakdown.longCount  / total) * 100).toFixed(1);
      const shortPct = ((positionBreakdown.shortCount / total) * 100).toFixed(1);

      document.getElementById('lsRatio').innerHTML = `
        <div class="ls-labels">
          <span class="ls-label long">Long</span>
          <span class="ls-label short">Short</span>
        </div>
        <div class="ls-bar-track">
          <div class="ls-bar-long"  style="width:${longPct}%"></div>
          <div class="ls-bar-short" style="width:${shortPct}%"></div>
        </div>
        <div class="ls-stats">
          <div class="ls-stat">
            <div class="ls-stat-pct long">${longPct}%</div>
            <div class="ls-stat-sub">${positionBreakdown.longCount} trades</div>
          </div>
          <div class="ls-divider"></div>
          <div class="ls-stat" style="text-align:right">
            <div class="ls-stat-pct short">${shortPct}%</div>
            <div class="ls-stat-sub">${positionBreakdown.shortCount} trades</div>
          </div>
        </div>`;
    }

    /* ── TIMEFRAME WIRING ── */
    function wireTf(containerId, callback) {
      document.getElementById(containerId).addEventListener('click', e => {
        const btn = e.target.closest('.tf-btn');
        if (!btn) return;
        document.querySelectorAll(`#${containerId} .tf-btn`).forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        callback(btn.dataset.tf);
      });
    }

    /* ── MAIN LOAD ── */
    async function load() {
      try {
        const res  = await fetch('/api/trades');
        const data = await res.json();
        if (data.error) throw new Error(data.error);

        const { byPeriod, equityCurve,
                symbolSummary, positionBreakdown, stats } = data;

        allEquity = equityCurve;

        document.getElementById('loadingEl').style.display  = 'none';
        document.getElementById('dashboard').style.display  = 'block';
        document.getElementById('lastUpdated').textContent  =
          'Updated ' + new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

        // Period cards
        renderPeriods(byPeriod);

        // Equity curve
        renderEquity('ALL');
        wireTf('equityTf', tf => renderEquity(tf));

        // Performance Breakdown
        renderBreakdown({ symbolSummary, positionBreakdown, stats });


      } catch (err) {
        document.getElementById('loadingEl').style.display = 'none';
        const eb = document.getElementById('error-banner');
        eb.style.display = 'block';
        eb.textContent   = 'Failed to load trading data: ' + err.message;
      }
    }

    load();
  </script>
</body>
</html>
